name: native_location_tracker
description: >
  A robust, native-first background location plugin for Flutter.
  Provides continuous tracking with native persistence and batch upload
  on both Android and iOS.
version: 0.2.1
homepage: https://github.com/Abmichael/native_location_tracker
repository: https://github.com/Abmichael/native_location_tracker
issue_tracker: https://github.com/Abmichael/native_location_tracker/issues

environment:
  sdk: ^3.9.2
  flutter: ">=3.3.0"

dependencies:
  flutter:
    sdk: flutter
  device_info_plus: ^13.1.0
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  plugin:
    platforms:
      android:
        package: dev.nativelocation.tracker
        pluginClass: NativeLocationTrackerPlugin
      ios:
        pluginClass: NativeLocationTrackerPlugin
